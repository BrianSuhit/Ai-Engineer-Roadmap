<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ai Engineer Roadmap - Brian Suhit</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- titulo principal -->
    <header>
        <h1>AI ENGINEER ROADMAP</h1>
    </header>

    <!-- contenedor principal -->
    <main class="roadmap-container">

        <!-- NODO 2: PYTHON FUNDAMENTALS -->
        <div class="roadmap-row">

            <!-- COLUMNA IZQUIERDA: EL PROYECTO -->
            <div class="col-project">
                <div class="project-card" onclick="openModal('repo-python')">
                    <strong>🚀 PROYECTO</strong>
                    <span>Python AI Journey</span>
                </div>
            </div>

            <!-- COLUMNA CENTRAL: EL TRONCO -->
                <div class="col-main">
                <div class="main-node completed">
                    <h2>2. Python Fundamentals</h2>
                </div>
                <!-- La línea vertical que conecta con el siguiente -->
                <div class="connector-line"></div>
            </div>

            <!-- COLUMNA DERECHA: SUBNODOS -->
            <div class="col-subnodes">
                <div class="subnode" onclick="openModal('venv')">Virtual Environments</div>
                <div class="subnode" onclick="openModal('poo')">POO (Clases)</div>
                <div class="subnode" onclick="openModal('pandas')">Pandas Dataframes</div>
                
            </div>

        </div>

        <!-- NODO 3: INTRODUCCION -->
        <div class="roadmap-row">
            
            <!-- IZQUIERDA VACÍA (No hay proyecto) -->
            <div class="col-project"></div>

            <!-- CENTRAL -->
            <div class="col-main">
                <div class="main-node pending">
                    <h2>3. Introduction</h2>
                </div>
                <div class="connector-line"></div>
            </div>

            <!-- DERECHA -->
            <div class="col-subnodes">
                <div class="subnode">AI vs ML Engineer</div>
                <div class="subnode">Roles & Responsibilities</div>
            </div>

        </div>

    </main>

    <!-- EL MODAL (Ventana Única) -->
    <div id="modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <button onclick="closeModal()">X</button>
            <h2 id="modal-title">Título</h2>
            <div id="modal-body">Contenido...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
